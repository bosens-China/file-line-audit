name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# 并发控制：如果同一分支有新的任务启动，则取消正在运行的旧任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true # 开启 Go 依赖缓存

      - name: Run tests
        run: go test -v ./...

  refresh-skill-binaries:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 获取完整历史以支持推送

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Rebuild packaged binaries
        run: |
          chmod +x ./scripts/build-skill.sh
          ./scripts/build-skill.sh

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 提交所有变更（包括二进制文件和可能的 go.sum 更新）
          git add .
          
          # 检查是否有文件变更
          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping."
            exit 0
          fi
          
          git commit -m "chore(ci): refresh packaged skill binaries [skip ci]"
          
          # 此时工作区已干净，可以安全地 rebase
          git pull --rebase origin main
          git push origin main
